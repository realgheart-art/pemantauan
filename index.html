<!DOCTYPE html>
<html lang="ms">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pemantauan Sekolah &mdash; JPN Kedah</title>
<link rel="icon" type="image/png" href="logo.png">
<link rel="apple-touch-icon" href="logo.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,700&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.4/chart.umd.min.js"></script>
<script>if(typeof Chart==='undefined'){document.write('<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"><\/script>');}</script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
  :root{
    --navy-950:#0a1628; --navy-900:#0f2038; --navy-800:#16304f; --navy-700:#1e4066;
    --brass:#c8a24a; --brass-light:#e4c775; --brass-dark:#8f7328;
    --cream:#f7f4ec; --ink:#1b2430; --muted:#6b7688; --line:#e4e0d3;
    --ok:#3f8f5f; --warn:#c9862b; --bad:#b5473a;
    --radius:14px;
  }
  *{box-sizing:border-box;}
  body{margin:0;font-family:'Plus Jakarta Sans',sans-serif;background:var(--cream);color:var(--ink);}
  h1,h2,h3,.brand{font-family:'Fraunces',serif;}
  button{font-family:inherit;cursor:pointer;transition:transform .08s ease, box-shadow .15s ease, background .15s ease, opacity .15s ease;}
  button:active{transform:scale(.94);}
  button:disabled{opacity:.6;cursor:progress;}
  @keyframes spin{to{transform:rotate(360deg);}}
  .btn-spinner{display:inline-block;width:13px;height:13px;border:2px solid rgba(255,255,255,.4);border-top-color:#fff;border-radius:50%;animation:spin .6s linear infinite;vertical-align:middle;margin-right:6px;}
  .btn-outline .btn-spinner{border-color:rgba(15,32,56,.3);border-top-color:var(--navy-900);}
  @keyframes pop{0%{transform:scale(1);}50%{transform:scale(1.04);}100%{transform:scale(1);}}
  .btn-pop{animation:pop .25s ease;}
  .app{min-height:100vh;display:flex;flex-direction:column;}

  /* ===== HEADER ===== */
  header.top{background:linear-gradient(135deg,var(--navy-950),var(--navy-800));color:#fff;padding:16px 20px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50;box-shadow:0 2px 12px rgba(0,0,0,.25);}
  header.top .brand{font-size:20px;font-weight:600;letter-spacing:.3px;display:flex;align-items:center;gap:10px;}
  header.top .brand .crest{width:38px;height:38px;border-radius:50%;object-fit:cover;flex-shrink:0;}
  header.top .sub{font-size:11px;color:var(--brass-light);font-weight:500;letter-spacing:.5px;text-transform:uppercase;}
  .userchip{display:flex;align-items:center;gap:10px;font-size:13px;}
  .userchip button{background:transparent;border:1px solid rgba(255,255,255,.3);color:#fff;padding:6px 12px;border-radius:20px;font-size:12px;}
  .userchip button:hover{background:rgba(255,255,255,.1);}

  /* ===== LOGIN ===== */
  .login-wrap{flex:1;display:flex;align-items:center;justify-content:center;background:radial-gradient(circle at 20% 20%,var(--navy-800),var(--navy-950) 60%);padding:20px;}
  .login-card{background:#fff;border-radius:20px;padding:40px 36px;max-width:380px;width:100%;box-shadow:0 30px 60px rgba(0,0,0,.35);border-top:4px solid var(--brass);}
  .login-card .crest{width:88px;height:88px;border-radius:50%;object-fit:cover;display:block;margin:0 auto 14px;box-shadow:0 4px 16px rgba(15,32,56,.25);}
  .login-card h1{text-align:center;font-size:22px;margin:0 0 4px;color:var(--navy-900);}
  .login-card p.tag{text-align:center;color:var(--muted);font-size:13px;margin:0 0 26px;}
  label{display:block;font-size:12px;font-weight:600;color:var(--navy-800);margin:14px 0 6px;text-transform:uppercase;letter-spacing:.4px;}
  input[type=email],input[type=password],input[type=text],select,textarea{
    width:100%;padding:11px 14px;border:1.5px solid var(--line);border-radius:10px;font-size:14px;font-family:inherit;background:#fdfcf9;
  }
  input:focus,select:focus,textarea:focus{outline:none;border-color:var(--brass);box-shadow:0 0 0 3px rgba(200,162,74,.18);}
  .btn-primary{width:100%;margin-top:22px;background:linear-gradient(135deg,var(--navy-800),var(--navy-950));color:#fff;border:none;padding:13px;border-radius:10px;font-weight:600;font-size:14px;letter-spacing:.3px;}
  .btn-primary:hover{background:var(--navy-700);}
  .error-msg{color:var(--bad);font-size:13px;margin-top:10px;text-align:center;}

  /* ===== LAYOUT ===== */
  .main{flex:1;display:flex;}
  nav.side{width:220px;background:var(--navy-900);color:#fff;padding:22px 0;flex-shrink:0;}
  nav.side .navitem{padding:12px 24px;font-size:14px;font-weight:500;color:#c7d0de;cursor:pointer;border-left:3px solid transparent;display:flex;align-items:center;gap:10px;}
  nav.side .navitem:hover{background:rgba(255,255,255,.05);}
  nav.side .navitem.active{color:#fff;border-left-color:var(--brass);background:rgba(200,162,74,.1);}
  .content{flex:1;padding:28px 32px;overflow-y:auto;}
  .content h2{margin:0 0 4px;font-size:24px;color:var(--navy-900);}
  .content .lede{color:var(--muted);font-size:13.5px;margin:0 0 22px;}

  /* ===== CARDS / GRID ===== */
  .card{background:#fff;border-radius:var(--radius);padding:20px;box-shadow:0 1px 3px rgba(20,30,50,.08);border:1px solid var(--line);}
  .grid-stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:14px;margin-bottom:22px;}
  .stat{background:#fff;border-radius:var(--radius);padding:18px;border:1px solid var(--line);border-left:4px solid var(--brass);}
  .stat .num{font-family:'Fraunces',serif;font-size:30px;color:var(--navy-900);font-weight:700;}
  .stat .lbl{font-size:12px;color:var(--muted);text-transform:uppercase;letter-spacing:.4px;margin-top:2px;}

  /* ===== PEGAWAI: PILIH SEKOLAH ===== */
  .search-box{display:flex;gap:10px;margin-bottom:16px;}
  .search-box input{flex:1;}
  .sekolah-list{display:grid;gap:10px;max-height:520px;overflow-y:auto;}
  .sekolah-item{background:#fff;border:1px solid var(--line);border-radius:10px;padding:14px 16px;display:flex;justify-content:space-between;align-items:center;}
  .sekolah-item:hover{border-color:var(--brass);}
  .sekolah-item .nama{font-weight:600;color:var(--navy-900);font-size:14px;}
  .sekolah-item .meta{font-size:12px;color:var(--muted);}
  .sekolah-item button{background:var(--navy-900);color:#fff;border:none;padding:8px 16px;border-radius:20px;font-size:12.5px;font-weight:600;}
  .sekolah-item button:hover{background:var(--brass-dark);}

  /* ===== PEMANTAUAN FORM ===== */
  .kategori-tabs{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:20px;}
  .kategori-tabs button{padding:8px 16px;border-radius:20px;border:1.5px solid var(--line);background:#fff;font-size:13px;font-weight:600;color:var(--navy-800);}
  .kategori-tabs button.active{background:var(--navy-900);color:#fff;border-color:var(--navy-900);}
  .kategori-tabs button .badge{background:var(--brass);color:var(--navy-950);border-radius:10px;padding:1px 6px;font-size:10px;margin-left:6px;}
  .item-row{background:#fff;border:1px solid var(--line);border-radius:12px;padding:16px 18px;margin-bottom:12px;}
  .item-row .perkara{font-weight:600;font-size:14px;color:var(--navy-900);margin-bottom:10px;}
  .binari-btns{display:flex;gap:10px;margin-bottom:10px;}
  .binari-btns button{flex:1;max-width:180px;height:44px;border-radius:8px;border:1.5px solid var(--line);background:#fdfcf9;font-weight:700;font-size:14px;color:var(--muted);}
  .binari-btns button.sel-positif{background:var(--ok);color:#fff;border-color:var(--ok);}
  .binari-btns button.sel-negatif{background:var(--bad);color:#fff;border-color:var(--bad);}
  .item-row textarea{min-height:56px;resize:vertical;}
  .item-row .photo-row{margin-top:10px;display:flex;align-items:center;gap:12px;}
  .item-row .photo-row img{height:52px;border-radius:8px;border:1px solid var(--line);}
  .photo-btn{background:var(--cream);border:1.5px dashed var(--line);padding:8px 14px;border-radius:8px;font-size:12.5px;color:var(--navy-800);font-weight:600;}
  .submit-bar{position:sticky;bottom:0;background:#fff;padding:16px 0;border-top:1px solid var(--line);display:flex;justify-content:flex-end;margin-top:20px;}
  .submit-bar button{background:linear-gradient(135deg,var(--navy-800),var(--navy-950));color:#fff;border:none;padding:13px 28px;border-radius:10px;font-weight:700;font-size:14px;}

  /* ===== ADMIN TABLE ===== */
  table{width:100%;border-collapse:collapse;background:#fff;border-radius:var(--radius);overflow:hidden;}
  th{background:var(--navy-900);color:#fff;text-align:left;padding:11px 14px;font-size:12px;text-transform:uppercase;letter-spacing:.3px;}
  td{padding:11px 14px;font-size:13.5px;border-bottom:1px solid var(--line);}
  tr:last-child td{border-bottom:none;}
  .officer-tag{display:inline-flex;align-items:center;gap:6px;background:var(--cream);border:1px solid var(--line);padding:3px 10px;border-radius:20px;font-size:12px;font-weight:600;color:var(--navy-800);}
  .filters{display:flex;gap:10px;margin-bottom:16px;flex-wrap:wrap;}
  .filters select,.filters input{width:auto;min-width:140px;}
  .tag-kategori{background:var(--navy-900);color:#fff;font-size:11px;padding:6px 12px;border-radius:20px;font-weight:600;border:none;}
  .tag-kategori.inactive{background:#ccc;color:#666;}
  .kategori-manage-row{display:flex;justify-content:space-between;align-items:center;padding:12px 16px;border:1px solid var(--line);border-radius:10px;margin-bottom:8px;background:#fff;}
  .add-form{display:flex;gap:8px;margin-top:14px;}
  .add-form input{flex:1;}
  .add-form button{background:var(--navy-900);color:#fff;border:none;padding:0 18px;border-radius:8px;font-weight:600;font-size:13px;}
  .hidden{display:none !important;}
  .charts-grid{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-top:8px;}
  @media(max-width:900px){.charts-grid{grid-template-columns:1fr;} nav.side{width:64px;} nav.side .navitem span.txt{display:none;} .content{padding:18px;}}

  /* ===== NOTIF BADGE ===== */
  .nav-badge{background:var(--bad);color:#fff;font-size:10.5px;font-weight:700;border-radius:10px;padding:1px 7px;margin-left:auto;}
  .navitem{justify-content:flex-start;}

  /* ===== BUTTONS: EXPORT / PDF ===== */
  .action-bar{display:flex;gap:10px;margin-bottom:16px;flex-wrap:wrap;}
  .btn-outline{background:#fff;border:1.5px solid var(--navy-800);color:var(--navy-800);padding:9px 16px;border-radius:8px;font-weight:600;font-size:13px;display:inline-flex;align-items:center;gap:6px;}
  .btn-outline:hover{background:var(--navy-900);color:#fff;}
  .btn-gold{background:var(--brass);border:none;color:var(--navy-950);padding:9px 16px;border-radius:8px;font-weight:700;font-size:13px;display:inline-flex;align-items:center;gap:6px;}
  .btn-gold:hover{background:var(--brass-dark);color:#fff;}

  /* ===== PETA ===== */
  #peta-container{height:560px;border-radius:var(--radius);overflow:hidden;border:1px solid var(--line);}
  .peta-legend{display:flex;gap:18px;margin-bottom:14px;font-size:12.5px;color:var(--navy-800);flex-wrap:wrap;}
  .peta-legend span{display:inline-flex;align-items:center;gap:6px;}
  .dot{width:11px;height:11px;border-radius:50%;display:inline-block;}
  .dot.belum{background:#9aa5b5;} .dot.sikit{background:var(--warn);} .dot.kerap{background:var(--ok);}

  /* ===== TINDAK SUSUL ===== */
  .status-pill{padding:4px 12px;border-radius:20px;font-size:11.5px;font-weight:700;border:none;}
  .status-pill.belum{background:#fbe4e1;color:var(--bad);}
  .status-pill.dalam{background:#fdefd8;color:var(--warn);}
  .status-pill.selesai{background:#e3f2e8;color:var(--ok);}
  .tindak-card{background:#fff;border:1px solid var(--line);border-left:4px solid var(--bad);border-radius:12px;padding:16px 18px;margin-bottom:12px;}
  .tindak-card.selesai{border-left-color:var(--ok);}
  .tindak-card.dalam{border-left-color:var(--warn);}
  .tindak-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:12px;}
  .settings-card{background:var(--cream);border:1px solid var(--line);border-radius:12px;padding:16px 18px;margin-bottom:20px;display:flex;align-items:center;gap:14px;flex-wrap:wrap;}
  .settings-card input{width:80px;}

  /* ===== TOGGLE SUIS (enable/disable kategori) ===== */
  .switch{position:relative;display:inline-block;width:46px;height:26px;flex-shrink:0;}
  .switch input{opacity:0;width:0;height:0;}
  .switch .slider{position:absolute;cursor:pointer;inset:0;background:#c7ccd4;border-radius:26px;transition:.2s;}
  .switch .slider:before{content:"";position:absolute;height:20px;width:20px;left:3px;bottom:3px;background:#fff;border-radius:50%;transition:.2s;box-shadow:0 1px 3px rgba(0,0,0,.3);}
  .switch input:checked + .slider{background:var(--ok);}
  .switch input:checked + .slider:before{transform:translateX(20px);}
  .kategori-card-disabled{opacity:.55;background:#f2f0ea;}
  .status-label{font-size:11.5px;font-weight:700;padding:3px 10px;border-radius:20px;}
  .status-label.on{background:#e3f2e8;color:var(--ok);}
  .status-label.off{background:#ececec;color:#8a8a8a;}
</style>
</head>
<body>
<div class="app" id="app">

  <!-- ===== LOGIN VIEW ===== -->
  <div class="login-wrap" id="view-login">
    <div class="login-card">
      <img src="logo.png" alt="Logo JPN Kedah" class="crest">
      <h1>Pemantauan Sekolah</h1>
      <p class="tag">Hadir Membimbing, Bersama Membina Kejayaan</p>
      <label>ID Pengguna</label>
      <input type="text" id="login-emel" placeholder="cth: shahril" autocapitalize="off" autocomplete="username">
      <label>PIN</label>
      <input type="password" id="login-pin" placeholder="••••">
      <button class="btn-primary" onclick="doLogin()">Log Masuk</button>
      <div class="error-msg hidden" id="login-error"></div>
    </div>
  </div>

  <!-- ===== APP SHELL (selepas login) ===== -->
  <div id="view-shell" class="hidden" style="display:flex;flex-direction:column;min-height:100vh;">
    <header class="top">
      <div class="brand"><img src="logo.png" alt="Logo JPN Kedah" class="crest"> Pemantauan Sekolah <span class="sub" id="role-badge" style="margin-left:8px;"></span></div>
      <div class="userchip"><span id="user-nama"></span><button onclick="logout()">Log Keluar</button></div>
    </header>
    <div class="main">
      <nav class="side" id="sidebar"></nav>
      <div class="content" id="content"></div>
    </div>
  </div>
</div>

<script>
/* ================= KONFIGURASI ================= */
// GANTI dengan URL Web App selepas deploy Apps Script (Deploy > New deployment > Web app)
const API_URL = 'https://script.google.com/macros/s/AKfycbyYE2RJA_xWvf1WZSZpCKXgmkf1ERZw0G3M5TQwdTTHewNCebJLuDqlePPgrKFTrYmz/exec';

let CURRENT_USER = null;
let KATEGORI_DATA = [];
let SEKOLAH_DATA = [];
let SELECTED_SEKOLAH = null;
let DAPATAN_STATE = {}; // { itemId: {skala, catatan, gambarBase64} }
let ACTIVE_KATEGORI_ID = null;

/* ================= API HELPER ================= */
async function callApi(action, payload = {}) {
  const res = await fetch(API_URL + '?action=' + action, {
    method: 'POST',
    body: JSON.stringify(payload)
  });
  return res.json();
}

/* ================= LOGIN / LOGOUT ================= */
async function doLogin() {
  const emel = document.getElementById('login-emel').value.trim();
  const pin = document.getElementById('login-pin').value.trim();
  const errEl = document.getElementById('login-error');
  errEl.classList.add('hidden');
  if (!emel || !pin) { errEl.textContent = 'Sila isi ID Pengguna dan PIN.'; errEl.classList.remove('hidden'); return; }
  const result = await callApi('login', { emel, pin });
  if (!result.success) { errEl.textContent = result.message || 'Log masuk gagal.'; errEl.classList.remove('hidden'); return; }
  CURRENT_USER = result.user;
  sessionStorage.setItem('pemantauan_user', JSON.stringify(CURRENT_USER));
  initShell();
}

function logout() {
  CURRENT_USER = null;
  sessionStorage.removeItem('pemantauan_user');
  document.getElementById('view-shell').classList.add('hidden');
  document.getElementById('view-login').classList.remove('hidden');
}

window.addEventListener('load', () => {
  const saved = sessionStorage.getItem('pemantauan_user');
  if (saved) { CURRENT_USER = JSON.parse(saved); initShell(); }
});

/* ================= APP SHELL ================= */
function initShell() {
  document.getElementById('view-login').classList.add('hidden');
  document.getElementById('view-shell').classList.remove('hidden');
  document.getElementById('user-nama').textContent = CURRENT_USER.nama;
  document.getElementById('role-badge').textContent = CURRENT_USER.peranan === 'Admin' ? '· ADMIN' : '· PEGAWAI PEMANTAU';

  const sidebar = document.getElementById('sidebar');
  if (CURRENT_USER.peranan === 'Admin') {
    sidebar.innerHTML = `
      <div class="navitem active" data-view="dashboard" onclick="nav('dashboard')">📊 <span class="txt">Dashboard</span></div>
      <div class="navitem" data-view="senarai" onclick="nav('senarai')">📋 <span class="txt">Senarai Pemantauan</span></div>
      <div class="navitem" data-view="peta" onclick="nav('peta')">🗺️ <span class="txt">Peta Sekolah</span></div>
      <div class="navitem" data-view="tindaksusul" onclick="nav('tindaksusul')">🔔 <span class="txt">Tindak Susul</span> <span class="nav-badge hidden" id="badge-tindaksusul"></span></div>
      <div class="navitem" data-view="urus" onclick="nav('urus')">⚙️ <span class="txt">Urus Kategori & Item</span></div>
    `;
    nav('dashboard');
    muatBadgeTindakSusul();
  } else {
    sidebar.innerHTML = `
      <div class="navitem active" data-view="pilihsekolah" onclick="nav('pilihsekolah')">🏫 <span class="txt">Buat Pemantauan</span></div>
      <div class="navitem" data-view="senarai" onclick="nav('senarai')">📋 <span class="txt">Sejarah Lawatan Saya</span></div>
    `;
    nav('pilihsekolah');
  }
}

function nav(view) {
  document.querySelectorAll('.navitem').forEach(el => el.classList.toggle('active', el.dataset.view === view));
  const c = document.getElementById('content');
  if (view === 'dashboard') renderDashboard();
  else if (view === 'senarai') renderSenarai();
  else if (view === 'urus') renderUrusKategori();
  else if (view === 'pilihsekolah') renderPilihSekolah();
  else if (view === 'peta') renderPetaSekolah();
  else if (view === 'tindaksusul') renderTindakSusul();
}

async function muatBadgeTindakSusul() {
  const result = await callApi('getNotifikasiBadge', {});
  const badge = document.getElementById('badge-tindaksusul');
  if (result.belumTindakan > 0) { badge.textContent = result.belumTindakan; badge.classList.remove('hidden'); }
  else badge.classList.add('hidden');
}

/* ================= PEGAWAI: PILIH SEKOLAH ================= */
async function renderPilihSekolah() {
  const c = document.getElementById('content');
  c.innerHTML = `<h2>Pilih Sekolah</h2><p class="lede">Cari & pilih sekolah untuk memulakan sesi pemantauan.</p>
    <div class="search-box"><input type="text" id="cari-sekolah" placeholder="Cari nama atau kod sekolah..." oninput="filterSekolah()"></div>
    <div class="sekolah-list" id="sekolah-list"><p style="color:var(--muted);">Memuatkan senarai sekolah...</p></div>`;
  if (SEKOLAH_DATA.length === 0) SEKOLAH_DATA = await callApi('getSekolah');
  filterSekolah();
}

function filterSekolah() {
  const q = (document.getElementById('cari-sekolah')?.value || '').toLowerCase();
  const list = SEKOLAH_DATA.filter(s => (s.NamaSekolah + s.KodSekolah).toLowerCase().includes(q)).slice(0, 60);
  document.getElementById('sekolah-list').innerHTML = list.map(s => `
    <div class="sekolah-item">
      <div><div class="nama">${s.NamaSekolah}</div><div class="meta">${s.KodSekolah} · ${s.PPD} · ${s.Gred}</div></div>
      <button onclick='mulaPemantauan(${JSON.stringify(s)})'>Mula Pemantauan</button>
    </div>`).join('') || '<p style="color:var(--muted);">Tiada sekolah dijumpai.</p>';
}

/* ================= PEGAWAI: BORANG PEMANTAUAN ================= */
async function mulaPemantauan(sekolah) {
  SELECTED_SEKOLAH = sekolah;
  DAPATAN_STATE = {};
  // Sentiasa muat kategori aktif terkini (bukan cache) supaya kategori yang ditutup Admin tak muncul
  KATEGORI_DATA = await callApi('getKategoriPenuh');
  if (!KATEGORI_DATA || KATEGORI_DATA.length === 0) {

  renderItemList();
}

function renderKategoriTabs() {
  const el = document.getElementById('kategori-tabs');
  el.innerHTML = KATEGORI_DATA.map(k => {
    const diisi = k.items.filter(i => DAPATAN_STATE[i.id]?.jawapan).length;

      ${k.nama} <span class="badge">${diisi}/${k.items.length}</span></button>`;
  }).join('');
}

function gantiKategori(id) { ACTIVE_KATEGORI_ID = id; renderKategoriTabs(); renderItemList(); }

function renderItemList() {
  const kat = KATEGORI_DATA.find(k => k.id === ACTIVE_KATEGORI_ID);
  const el = document.getElementById('item-list');
  el.innerHTML = kat.items.map(item => {
    const state = DAPATAN_STATE[item.id] || {};
    const pos = item.opsiPositif || 'Ada';
    const neg = item.opsiNegatif || 'Tiada';
    const selPos = state.jawapan === pos ? 'sel-positif' : '';
    const selNeg = state.jawapan === neg ? 'sel-negatif' : '';
    return `<div class="item-row">
      <div class="perkara">${item.perkara}</div>
      <div class="binari-btns">
        <button class="${selPos}" onclick="setJawapan(${item.id},'${pos.replace(/'/g,"\\'")}',true)">✓ ${pos}</button>
        <button class="${selNeg}" onclick="setJawapan(${item.id},'${neg.replace(/'/g,"\\'")}',false)">✕ ${neg}</button>
      </div>
      <textarea placeholder="Catatan (digalakkan jika jawapan negatif)..." oninput="setCatatan(${item.id}, this.value)">${state.catatan || ''}</textarea>
      <div class="photo-row">
        <label class="photo-btn" style="margin:0;">📸 Ambil Guna Kamera
          <input type="file" accept="image/*" capture="environment" style="display:none" onchange="setGambar(${item.id}, this)">
        </label>
        <label class="photo-btn" style="margin:0;">🖼️ Pilih dari Galeri
          <input type="file" accept="image/*" style="display:none" onchange="setGambar(${item.id}, this)">
        </label>
        ${state.gambarBase64 ? `<img src="${state.gambarBase64}"><button class="photo-btn" style="margin:0;border-color:var(--bad);color:var(--bad);" onclick="buangGambar(${item.id})">✕ Buang</button>` : ''}
      </div>
    </div>`;
  }).join('');
}

function setJawapan(itemId, jawapan, positif) {
  DAPATAN_STATE[itemId] = { ...(DAPATAN_STATE[itemId] || {}), jawapan: jawapan, positif: positif };
  renderKategoriTabs(); renderItemList();
}
function setCatatan(itemId, val) { DAPATAN_STATE[itemId] = { ...(DAPATAN_STATE[itemId] || {}), catatan: val }; }
function setGambar(itemId, input) {
  const file = input.files[0]; if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    // Mampatkan gambar dahulu — gambar kamera moden boleh 5-10MB, ini melambatkan upload.
    const img = new Image();
    img.onload = () => {
      const maxLebar = 1000;
      const skala = Math.min(1, maxLebar / img.width);
      const canvas = document.createElement('canvas');
      canvas.width = img.width * skala;
      canvas.height = img.height * skala;
      canvas.getContext('2d').drawImage(img, 0, 0, canvas.width, canvas.height);
      const mampat = canvas.toDataURL('image/jpeg', 0.7);
      DAPATAN_STATE[itemId] = { ...(DAPATAN_STATE[itemId] || {}), gambarBase64: mampat };
      renderItemList();
    };
    img.onerror = () => {
      // Jika bukan imej yang boleh diproses, guna terus
      DAPATAN_STATE[itemId] = { ...(DAPATAN_STATE[itemId] || {}), gambarBase64: e.target.result };
      renderItemList();
    };
    img.src = e.target.result;
  };
  reader.readAsDataURL(file);
}

function buangGambar(itemId) {
  if (DAPATAN_STATE[itemId]) delete DAPATAN_STATE[itemId].gambarBase64;
  renderItemList();
}

async function hantarPemantauan() {
  const dapatan = Object.keys(DAPATAN_STATE).filter(id => DAPATAN_STATE[id].jawapan).map(id => ({
    itemId: id, jawapan: DAPATAN_STATE[id].jawapan, positif: DAPATAN_STATE[id].positif,
    catatan: DAPATAN_STATE[id].catatan || '', gambarBase64: DAPATAN_STATE[id].gambarBase64 || ''
  }));
  if (dapatan.length === 0) { alert('Sila jawab sekurang-kurangnya satu perkara semakan sebelum hantar.'); return; }

  // Semak dulu: adakah pegawai ini sudah pantau sekolah ini hari ini?
  const semak = await callApi('semakPemantauanHariIni', {
    kodSekolah: SELECTED_SEKOLAH.KodSekolah, pegawaiId: CURRENT_USER.id
  });

  let gantiId = null;
  if (semak.wujud) {
    const masa = new Date(semak.tarikhMasa).toLocaleString('ms-MY');
    const sah = confirm(
      `⚠️ AMARAN\n\nAnda telah pun membuat pemantauan untuk ${SELECTED_SEKOLAH.NamaSekolah} hari ini (${masa}).\n\n` +
      `Jika anda teruskan, rekod lama itu akan DIGANTIKAN dengan hantaran ini (bukan ditambah sebagai rekod baharu).\n\n` +
      `Teruskan dan ganti rekod lama?`
    );
    if (!sah) return; // pegawai batal
    gantiId = semak.pemantauanId;
  }

  const result = await callApi('submitPemantauan', {
    kodSekolah: SELECTED_SEKOLAH.KodSekolah, pegawaiId: CURRENT_USER.id, namaPegawai: CURRENT_USER.nama, dapatan, gantiId
  });
  if (result.success) {
    let msg = gantiId ? 'Rekod pemantauan hari ini telah dikemas kini (rekod lama diganti).' : 'Pemantauan berjaya dihantar.';
    if (result.jumlahNegatif > 0) {
      msg += `\n\n${result.jumlahNegatif} dapatan negatif direkodkan sebagai Tindak Susul untuk tindakan Admin.`;
    }
    alert(msg); nav('pilihsekolah');
  }
  else {
    // Jika sistem sibuk, data pegawai KEKAL — mereka boleh tekan Hantar semula tanpa isi balik
    alert('⚠️ ' + (result.error || result.message || 'Penghantaran tidak berjaya.') +
      '\n\nData anda masih tersimpan dalam borang. Sila tekan "Hantar Pemantauan" sekali lagi.');
  }
}

function eksportSenaraiExcel() {
  if (SENARAI_TERKINI.length === 0) { alert('Tiada data untuk dieksport.'); return; }
  const data = SENARAI_TERKINI.map(p => ({
    'Kod Sekolah': p.kodSekolah, 'Nama Sekolah': p.namaSekolah, 'Pegawai Pemantau': p.namaPegawai,
    'Tarikh & Masa': new Date(p.tarikhMasa).toLocaleString('ms-MY'), 'Status': p.status
  }));
  const ws = XLSX.utils.json_to_sheet(data);
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, 'Senarai Pemantauan');
  XLSX.writeFile(wb, `Senarai_Pemantauan_${Utilities_formatTarikhFail()}.xlsx`);
}

function Utilities_formatTarikhFail() {
  const d = new Date();
  return `${d.getFullYear()}${String(d.getMonth()+1).padStart(2,'0')}${String(d.getDate()).padStart(2,'0')}`;
}

      <span><span class="dot kerap"></span> 3 kali atau lebih</span>
    </div>
    <div id="peta-info" style="font-size:12.5px;color:var(--muted);margin-bottom:10px;"></div>
    <div id="peta-container"></div>`;

  PETA_DATA = await callApi('getPetaStats', {});
  if (PETA_INSTANCE) { PETA_INSTANCE.remove(); PETA_INSTANCE = null; }
  PETA_INSTANCE = L.map('peta-container').setView([6.12, 100.37], 10); // pusat Kedah
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { attribution: '&copy; OpenStreetMap' }).addTo(PETA_INSTANCE);

  const info = document.getElementById('peta-info');
  if (!PETA_DATA || PETA_DATA.length === 0) {
    info.innerHTML = '⚠️ Tiada sekolah dengan koordinat (Lat/Lng) dalam pangkalan data. Sila pastikan lajur <b>Lat</b> dan <b>Lng</b> dalam sheet <b>Sekolah</b> diisi.';
    return;
  }

  // Isi dropdown PPD (unik, disusun)
  const senaraiPPD = [...new Set(PETA_DATA.map(s => s.ppd).filter(Boolean))].sort();
  const ppdSelect = document.getElementById('peta-ppd');
  senaraiPPD.forEach(ppd => {
    const opt = document.createElement('option');
    opt.value = ppd; opt.textContent = ppd;
    ppdSelect.appendChild(opt);
  });

  lukisMarkerPeta();
}

function lukisMarkerPeta() {
  if (!PETA_INSTANCE) return;
  // Buang marker sedia ada
  PETA_MARKERS.forEach(m => PETA_INSTANCE.removeLayer(m));
  PETA_MARKERS = [];

  const ppdPilih = document.getElementById('peta-ppd')?.value || '';
  const carian = (document.getElementById('peta-cari')?.value || '').toLowerCase();

  const data = PETA_DATA.filter(s => {
    const padananPPD = !ppdPilih || s.ppd === ppdPilih;
    const padananCari = !carian || (s.namaSekolah + s.kodSekolah).toLowerCase().includes(carian);
    return padananPPD && padananCari;
  });

  const koordinat = [];
  data.forEach(s => {
    const warna = s.bilangan === 0 ? '#9aa5b5' : (s.bilangan <= 2 ? '#c9862b' : '#3f8f5f');
    const tarikh = s.tarikhTerakhir ? new Date(s.tarikhTerakhir).toLocaleDateString('ms-MY') : 'Tiada';
    const icon = L.divIcon({
      className: 'pin-sekolah',
      html: `<div style="width:30px;height:30px;border-radius:50%;background:${warna};border:3px solid #fff;box-shadow:0 2px 6px rgba(0,0,0,.4);display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:13px;font-family:'Plus Jakarta Sans',sans-serif;">${s.bilangan}</div>`,
      iconSize: [30, 30], iconAnchor: [15, 15], popupAnchor: [0, -16]
    });
    const marker = L.marker([s.lat, s.lng], { icon }).addTo(PETA_INSTANCE);
    marker.bindPopup(`<b>${s.namaSekolah}</b><br>${s.kodSekolah} · ${s.ppd}<br>Bilangan dipantau: <b>${s.bilangan}</b><br>Lawatan terakhir: ${tarikh}`);
    PETA_MARKERS.push(marker);
    koordinat.push([s.lat, s.lng]);
  });

  const info = document.getElementById('peta-info');
  if (koordinat.length > 0) {
    PETA_INSTANCE.fitBounds(koordinat, { padding: [40, 40], maxZoom: 14 });
    const belum = data.filter(s => s.bilangan === 0).length;
    const dipantau = data.length - belum;
    info.innerHTML = `Memaparkan <b>${data.length}</b> sekolah · <b>${dipantau}</b> telah dipantau · <b>${belum}</b> belum dipantau. Nombor dalam pin = bilangan kali dipantau.`;
  } else {
    info.innerHTML = 'Tiada sekolah sepadan dengan tapisan semasa.';
  }
}

function resetTapisanPeta() {
  const ppd = document.getElementById('peta-ppd'); if (ppd) ppd.value = '';
  const cari = document.getElementById('peta-cari'); if (cari) cari.value = '';
  lukisMarkerPeta();
}

/* ================= PENJANA PDF (guna jsPDF + Chart.js) ================= */
let LOGO_BASE64_CACHE = null;

// Bungkus mana-mana tindakan async pada butang: papar spinner, tangkap ralat, pulihkan butang
async function dgnLoading(btn, teksSibuk, fn) {
  const asalHTML = btn.innerHTML;
  const isOutline = btn.classList.contains('btn-outline');
  btn.disabled = true;
  btn.innerHTML = `<span class="btn-spinner"></span>${teksSibuk}`;
  try {
    await fn();
  } catch (err) {
    alert('Ralat semasa menjana: ' + (err && err.message ? err.message : err) + '\n\nSila cuba lagi. Jika berterusan, semak sambungan internet & tetapan API.');
    console.error(err);
  } finally {
    btn.disabled = false;
    btn.innerHTML = asalHTML;
  }
}

async function getLogoBase64() {
  if (LOGO_BASE64_CACHE) return LOGO_BASE64_CACHE;
  try {
    const res = await fetch('logo.png');
    const blob = await res.blob();
    LOGO_BASE64_CACHE = await new Promise(resolve => {
      const reader = new FileReader();
      reader.onload = () => resolve(reader.result);
      reader.readAsDataURL(blob);
    });
  } catch (e) { LOGO_BASE64_CACHE = null; }
  return LOGO_BASE64_CACHE;
}

// Lukis carta bar bertindan (Ada hijau / Tiada merah) terus dalam jsPDF
// analitik: [{kategori, positif, negatif}]
function lukisBarKategori(doc, x, y, lebarPenuh, analitik) {
  const barTinggi = 6, jarak = 4, labelLebar = 52;
  const barX = x + labelLebar;
  const barMax = lebarPenuh - labelLebar - 26; // ruang untuk nilai di hujung
  analitik.forEach((a, i) => {
    const yy = y + i * (barTinggi + jarak);
    const jumlah = (a.positif || 0) + (a.negatif || 0);
    // Label kategori
    doc.setFont('helvetica', 'normal'); doc.setFontSize(8.5); doc.setTextColor(30);
    let label = a.kategori.length > 24 ? a.kategori.substring(0, 23) + '…' : a.kategori;
    doc.text(label, x, yy + barTinggi - 1);
    // Latar bar
    doc.setFillColor(238, 234, 222); doc.rect(barX, yy, barMax, barTinggi, 'F');
    if (jumlah > 0) {
      const wPos = barMax * (a.positif / jumlah);
      const wNeg = barMax * (a.negatif / jumlah);
      // Segmen 'Ada' (hijau)
      doc.setFillColor(63, 143, 95); doc.rect(barX, yy, wPos, barTinggi, 'F');
      // Segmen 'Tiada' (merah)
      doc.setFillColor(181, 71, 58); doc.rect(barX + wPos, yy, wNeg, barTinggi, 'F');
    }
    // Nilai: Ada/Tiada
    doc.setFont('helvetica', 'bold'); doc.setFontSize(8); doc.setTextColor(30);
    doc.text(`${a.positif || 0}/${a.negatif || 0}`, barX + barMax + 3, yy + barTinggi - 1);
  });
  return y + analitik.length * (barTinggi + jarak) + 2;
}

async function tambahKepalaSurat(doc, tajuk, subtajuk) {
  const logo = await getLogoBase64();
  if (logo) doc.addImage(logo, 'PNG', 14, 10, 20, 20);
  doc.setFont('helvetica', 'bold'); doc.setFontSize(13); doc.setTextColor(15, 32, 56);
  doc.text('JABATAN PENDIDIKAN NEGERI KEDAH', 40, 16);
  doc.setFontSize(15);
  doc.text(tajuk, 40, 24);
  doc.setFont('helvetica', 'normal'); doc.setFontSize(10); doc.setTextColor(100);
  doc.text(subtajuk, 40, 30);
  doc.setDrawColor(200, 162, 74); doc.setLineWidth(1);
  doc.line(14, 35, 196, 35);
  return 42; // Y permulaan kandungan
}

// Helper: seksyen analisis kategori (bar bertindan Ada/Tiada + jadual bilangan + perkara perlu perhatian)
function seksyenAnalitikKategori(doc, y, analitik) {
  if (!analitik || analitik.length === 0) {
    doc.setFontSize(10); doc.setTextColor(100);
    doc.text('Tiada data pemantauan untuk dianalisis.', 14, y);
    return y + 8;
  }
  // Petunjuk warna
  doc.setFont('helvetica', 'bold'); doc.setFontSize(11); doc.setTextColor(15, 32, 56);
  doc.text('Bilangan Ada vs Tiada Mengikut Kategori', 14, y); y += 6;
  doc.setFillColor(63,143,95); doc.rect(14, y-3.5, 3.5, 3.5, 'F');
  doc.setFont('helvetica','normal'); doc.setFontSize(8); doc.setTextColor(60);
  doc.text('Ada / Ya', 19, y-0.5);
  doc.setFillColor(181,71,58); doc.rect(44, y-3.5, 3.5, 3.5, 'F');
  doc.text('Tiada / Tidak / Tamat Tempoh   (nilai di hujung bar: Ada/Tiada)', 49, y-0.5);
  y += 4;
  y = lukisBarKategori(doc, 14, y, 182, analitik);
  y += 6;

  if (y > 225) { doc.addPage(); y = 20; }
  doc.autoTable({
    startY: y,
    head: [['Kategori', 'Ada', 'Tiada', 'Perkara Perlu Perhatian (paling banyak Tiada)']],
    body: analitik.map(a => [
      a.kategori,
      a.positif,
      a.negatif,
      a.itemTerlemah.length ? a.itemTerlemah.map(it => `${it.perkara} (${it.negatif})`).join('; ') : '—'
    ]),
    styles: { fontSize: 8, cellPadding: 2.5, valign: 'middle' },
    columnStyles: { 0: { cellWidth: 34 }, 1: { cellWidth: 14, halign: 'center' }, 2: { cellWidth: 14, halign: 'center' }, 3: { cellWidth: 120 } },
    headStyles: { fillColor: [15, 32, 56] }
  });
  return doc.lastAutoTable.finalY + 8;
}

function semakLib(doc) {
  if (!window.jspdf || !window.jspdf.jsPDF) throw new Error('Perpustakaan PDF (jsPDF) belum dimuatkan. Semak sambungan internet.');
  if (doc && typeof doc.autoTable !== 'function') throw new Error('Plugin jadual PDF (autotable) belum dimuatkan. Cuba hard refresh (Ctrl+Shift+R).');
}

// --- Laporan 1 Sesi Lawatan (analisis kategori) ---
async function janaLaporanLawatan(pemantauanId) {
  if (!window.jspdf || !window.jspdf.jsPDF) throw new Error('Perpustakaan PDF (jsPDF) belum dimuatkan. Semak sambungan internet.');
  const result = await callApi('getPemantauanDetail', { id: pemantauanId });
  const p = result.pemantauan;
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF();
  semakLib(doc);
  let y = await tambahKepalaSurat(doc, 'Laporan Pemantauan Sekolah', `${p.namaSekolah} (${p.kodSekolah}) · ${p.ppd}`);

  doc.setFontSize(10); doc.setTextColor(30);
  doc.text(`Pegawai Pemantau: ${p.namaPegawai}`, 14, y);
  doc.text(`Tarikh/Masa: ${new Date(p.tarikhMasa).toLocaleString('ms-MY')}`, 14, y + 6);
  y += 16;

  // Bina analitik kategori bagi lawatan ini (bilangan Ada/Tiada)
  const katMap = {};
  result.dapatan.forEach(d => {
    if (!katMap[d.kategori]) katMap[d.kategori] = { positif: 0, negatif: 0, items: {} };
    if (d.positif) katMap[d.kategori].positif += 1; else katMap[d.kategori].negatif += 1;
    if (!katMap[d.kategori].items[d.perkara]) katMap[d.kategori].items[d.perkara] = { positif: 0, negatif: 0 };
    if (d.positif) katMap[d.kategori].items[d.perkara].positif += 1; else katMap[d.kategori].items[d.perkara].negatif += 1;
  });
  const analitik = Object.keys(katMap).map(nama => {
    const c = katMap[nama];
    const itemTerlemah = Object.keys(c.items).map(p => ({ perkara: p, negatif: c.items[p].negatif }))
      .filter(it => it.negatif > 0).sort((a, b) => b.negatif - a.negatif).slice(0, 3);
    return { kategori: nama, positif: c.positif, negatif: c.negatif, bilItem: c.positif + c.negatif, itemTerlemah };
  }).sort((a, b) => b.negatif - a.negatif);

  y = seksyenAnalitikKategori(doc, y, analitik);

  doc.save(`Laporan_Lawatan_${p.kodSekolah}_${Utilities_formatTarikhFail()}.pdf`);
}

async function janaLaporanPegawai(pegawaiId) {
  if (!window.jspdf || !window.jspdf.jsPDF) throw new Error('Perpustakaan PDF (jsPDF) belum dimuatkan. Semak sambungan internet.');

  semakLib(doc);
  const tajukSub = pegawaiId ? (data.senarai[0]?.nama || 'Pegawai') : 'Semua Pegawai';
  let y = await tambahKepalaSurat(doc, 'Laporan Analitik Mengikut Pegawai', tajukSub);

  if (!data.senarai || data.senarai.length === 0) {
    doc.setFontSize(10); doc.setTextColor(100);
    doc.text('Tiada data pemantauan untuk pegawai ini.', 14, y);
    doc.save(`Laporan_Pegawai_${Utilities_formatTarikhFail()}.pdf`);
    return;
  }

  data.senarai.forEach((pg, idx) => {
    if (y > 235) { doc.addPage(); y = 20; }

    doc.setFillColor(15, 32, 56); doc.rect(14, y, 182, 8, 'F');
    doc.setFont('helvetica', 'bold'); doc.setFontSize(10); doc.setTextColor(255);
    doc.text(`${pg.nama}`, 16, y + 5.5);
    doc.setFont('helvetica', 'normal'); doc.setFontSize(8.5);
    doc.text(`${pg.jumlahLawatan} lawatan · ${pg.jumlahSekolah} sekolah · Ada: ${pg.jumlahPositif} / Tiada: ${pg.jumlahNegatif}`, 196, y + 5.5, { align: 'right' });
    y += 12;

    // Analitik kategori pegawai ni (bar bertindan Ada/Tiada)
    if (pg.analitikKategori.length > 0) {
      y = lukisBarKategori(doc, 14, y, 182, pg.analitikKategori);
      y += 8;
    } else {
      doc.setFontSize(9); doc.setTextColor(120); doc.text('Tiada dapatan direkodkan.', 16, y); y += 8;
    }
  });

  doc.save(`Laporan_Pegawai_${Utilities_formatTarikhFail()}.pdf`);
}
